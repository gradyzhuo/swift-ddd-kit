# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift-build-testing
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        swift: ["6.0", "6.1", "6.2"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}
      - run: ulimit -n 10000
      - name: Build
        run: swift build --build-tests --enable-code-coverage
      - name: Swift Testing
        run: swift test -v --skip-build --no-parallel --disable-xctest --enable-swift-testing --filter DDDKitUnitTests
      - uses: sersoft-gmbh/swift-coverage-action@v4
        id: coverage-files
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ join(fromJSON(steps.coverage-files.outputs.files), ',') }}

  build-linux-distros:
    name: Build on ${{ matrix.image }}
    strategy:
      matrix:
        image:
          - "swift:6.2-amazonlinux2"
          - "swift:6.2-bookworm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            bash -c "swift build --build-tests && swift test -v --no-parallel --disable-xctest --enable-swift-testing --filter DDDKitUnitTests"
